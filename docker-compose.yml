services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://conceptualizer:conceptualizer@db:5432/conceptualizer
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conceptualizer
      POSTGRES_PASSWORD: conceptualizer
      POSTGRES_DB: conceptualizer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conceptualizer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
