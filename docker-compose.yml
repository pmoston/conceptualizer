services:
  app:
    container_name: conceptualizer-app
    hostname: conceptualizer-app
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: conceptualizer-db
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@conceptualizer-db:5432/${POSTGRES_DB}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY}
    volumes:
      - uploads:/app/uploads
    networks:
      - conceptualizer-net
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: conceptualizer-db
    hostname: conceptualizer-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - conceptualizer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  conceptualizer-net:
    name: ${DOCKER_NETWORK:-conceptualizer-net}
    driver: bridge

volumes:
  pgdata:
  uploads:
