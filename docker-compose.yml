services:
  converter:
    container_name: conceptualizer-converter
    hostname: conceptualizer-converter
    build: ./converter
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - conceptualizer-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    container_name: conceptualizer-migrate
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - conceptualizer-net
    depends_on:
      db:
        condition: service_healthy

  app:
    container_name: conceptualizer-app
    hostname: ${APP_HOST}
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: conceptualizer-db
      DATABASE_URL: ${DATABASE_URL}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CONVERTER_URL: http://conceptualizer-converter:3001
    volumes:
      - ./uploads:/app/uploads
    networks:
      - conceptualizer-net
    depends_on:
      migrate:
        condition: service_completed_successfully
      converter:
        condition: service_healthy

  db:
    container_name: conceptualizer-db
    hostname: ${DB_HOST}
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - conceptualizer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  conceptualizer-net:
    name: ${DOCKER_NETWORK:-conceptualizer-net}
    driver: bridge

volumes:
  pgdata:
